services:
  jenkins:
    build: .
    user: root
    container_name: hello-demo-jenkins
    ports:
      - "8085:8080"
      - "50000:50000"
    volumes:
      - jenkins_home:/var/jenkins_home
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - DOCKERHUB_TOKEN=${DOCKERHUB_TOKEN}

volumes:
  jenkins_home: